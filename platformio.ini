[env:esp32dev-mini]
board = esp32-c3-devkitm-1
lib_compat_mode = strict
platform = espressif32
framework = arduino
monitor_speed = 115200
; Lower, more robust upload rate — the native-USB C3 was dropping the large app image
; mid-write at the default speed (flaky USB power/cable on the car rig).
upload_speed = 115200
lib_deps =
	https://github.com/collin80/esp32_can.git
	collin80/can_common@^0.4.0
	NimBLE-Arduino@^2.0.0
	hoeken/PsychicHttp@^1.2.1
	https://github.com/ayushsharma82/ElegantOTA.git#psychic-http
	ppedro74/SerialCommands@^2.2.0
	powerbroker2/ELMDuino@^3.4.1
monitor_filters = send_on_enter, log2file
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D ELEGANTOTA_USE_PSYCHIC=1
	-D USE_NIMBLE
	; Only one BLE link is ever used (the iPhone; getClient reuses that inbound
	; connection). Default is 3 — drop to 1 to free per-connection BLE structures.
	-D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
board_build.partitions = partitions_ota.csv
extra_scripts = merge-bin.py



[env:esp32dev]
board = esp32dev
lib_compat_mode = strict
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
	https://github.com/collin80/esp32_can.git
	collin80/can_common@^0.4.0
	NimBLE-Arduino@^2.0.0
	hoeken/PsychicHttp@^1.2.1
	https://github.com/ayushsharma82/ElegantOTA.git#psychic-http
	ppedro74/SerialCommands@^2.2.0
	powerbroker2/ELMDuino@^3.4.1
monitor_filters = send_on_enter, log2file
build_flags =
	; -D ARDUINO_USB_MODE=1
	; -D ARDUINO_USB_CDC_ON_BOOT=1
	-D ELEGANTOTA_USE_PSYCHIC=1
	-D USE_NIMBLE
	; Only one BLE link is ever used (the iPhone; getClient reuses that inbound
	; connection). Default is 3 — drop to 1 to free per-connection BLE structures.
	-D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
board_build.partitions = partitions_ota.csv
extra_scripts = merge-bin.py


; Native host env for fast, hardware-free regression tests (pio test -e native).
; Compiles ONLY the portable logic layer (bus/affa/vdisplay) against Unity — the
; firmware src is excluded via build_src_filter (it pulls Arduino/CAN_FRAME). The
; NATIVE define guards the few target-only spots. See test/ for the suites.
[env:native]
platform = native
test_framework = unity
; Compile the project src/ into the test binary (off by default in test mode) so the
; tests link against the real logic layer, narrowed by build_src_filter below.
test_build_src = yes
build_flags =
	-std=gnu++17
	-D NATIVE
	-I src
; Compile only the portable logic layer (no Arduino/CAN_FRAME). Header-only mocks
; (bus/LoopbackCanBus.h, test/FakeClock.h) need no entry here.
build_src_filter = -<*> +<affa/> +<vdisplay/> +<record/> +<emulation/> +<core/> +<display/AffaDisplayBase.cpp>
