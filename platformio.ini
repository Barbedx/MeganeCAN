
[env:esp32dev]
board = esp32dev
lib_compat_mode = strict
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
	https://github.com/collin80/esp32_can.git
	collin80/can_common@^0.4.0
	; NimBLE-Arduino@^2.0.0
	hoeken/PsychicHttp@^1.2.1
	; https://github.com/ayushsharma82/ElegantOTA.git#psychic-http ; flash size too big to include ota
	ppedro74/SerialCommands@^2.2.0
	powerbroker2/ELMDuino@^3.4.1
	
    https://github.com/pschatzmann/arduino-audio-tools.git
    https://github.com/pschatzmann/ESP32-A2DP.git
monitor_filters = send_on_enter, log2file,esp32_exception_decoder, time
build_flags =
    -DCORE_DEBUG_LEVEL=1
	; -D ARDUINO_USB_MODE=1
	; -D ARDUINO_USB_CDC_ON_BOOT=1
	; -D ELEGANTOTA_USE_PSYCHIC=1
	; -D USE_NIMBLE 
board_build.partitions = huge_app.csv
[env]
extra_scripts = merge-bin.py 
build_type = debug

 